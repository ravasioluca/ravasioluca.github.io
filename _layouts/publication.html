<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="description" content="{{ page.abstract }}">
</head>
<body>
 <h1>{{ page.title }}</h1>

  {% if page.authors %}
    <p>Autori: {{ page.authors | join: ", " }}</p>
  {% endif %}

  {% if page.abstract %}
    <p>{{ page.abstract }}</p>
  {% endif %}

  {% if page.links.PDF %}
    <p><a href="{{ page.links.PDF }}">Scarica il PDF</a></p>
  {% endif %}
</body>
</html>
